services:
  app:
    image: ghcr.io/andrei3008/kids-store:latest
    container_name: kids-store
    ports:
      - "8015:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/kids-store.db
      - ADMIN_SECRET=${ADMIN_SECRET:-change-me-in-production}
    volumes:
      - kids-store-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  kids-store-data:
    driver: local
