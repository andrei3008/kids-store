services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8015:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./dev.db
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./prisma:/app/prisma
      - ./dev.db:/app/prisma/dev.db
    restart: unless-stopped
